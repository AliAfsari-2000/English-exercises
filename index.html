<!DOCTYPE html>
<html>

<head>

<title>Active and Passive Voice Exercise</title>

<style>

body {
    font-family: Arial;
    margin: 30px;
    line-height: 1.7;
}

h1 {
    color: #1a73e8;
}

button {
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
    border-radius: 5px;
    border: 1px solid #888;
}

button:hover {
    background-color: #ddd;
}

.answer {
    font-weight: bold;
    margin-bottom: 25px;
}

</style>

</head>


<body>


<h1>Active and Passive Voice Exercise</h1>


<h2>Present Simple Passive (am/is/are + past participle)</h2>


<div id="quiz"></div>



<script>


let questions = [

{
question:"They clean the room.",
passive:"The room ___ every day.",
correct:"is cleaned",
wrong:"are cleaned",
explanation:"The room is singular, so we use <b>is + past participle</b>.<br><br>clean → cleaned"
},


{
question:"She writes a letter.",
passive:"A letter ___ by her.",
correct:"is written",
wrong:"was written",
explanation:"Present Simple Passive = <b>am/is/are + past participle</b>.<br><br>write → written"
},


{
question:"They make cars.",
passive:"Cars ___ by them.",
correct:"are made",
wrong:"is made",
explanation:"Cars are plural, so we use <b>are + past participle</b>.<br><br>make → made"
}

];



let quiz = document.getElementById("quiz");



questions.forEach((q,index)=>{


let answers = [q.correct, q.wrong];


// Randomize answer positions

answers.sort(()=>Math.random()-0.5);



quiz.innerHTML += `


<p><b>${index+1}. Active:</b> ${q.question}</p>

<p>Passive: ${q.passive}</p>


<button onclick="check('${answers[0]}','${q.correct}','${index}')">
${answers[0]}
</button>


<button onclick="check('${answers[1]}','${q.correct}','${index}')">
${answers[1]}
</button>


<p id="result${index}" class="answer"></p>


`;

});





function check(selected, correct, index){


let result = document.getElementById("result"+index);



if(result.innerHTML !== ""){


// Hide explanation

result.innerHTML = "";


}

else{


if(selected == correct){


result.innerHTML =
"✅ Correct!<br><br>" +
questions[index].explanation;


}


else{


result.innerHTML =
"❌ Try again.<br><br>" +
"Remember: Passive = be + past participle";


}


}


}



</script>


</body>

</html>
