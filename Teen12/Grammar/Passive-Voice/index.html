<!DOCTYPE html>
<html>

<head>

<title>Passive Voice Exercise</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family:Arial,sans-serif;
    margin:30px;
    background:#f5f5f5;
    line-height:1.7;
}

h1{
    color:#1a73e8;
    text-align:center;
}

h2{
    color:#444;
    margin-top:40px;
}

.question{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:25px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

button{

    padding:10px 18px;
    margin:5px;
    cursor:pointer;
    border-radius:6px;
    border:1px solid #999;
    background:white;
    font-size:16px;

}

button:hover{

    background:#e8f0fe;

}

.answer{

    margin-top:12px;
    font-weight:bold;

}

</style>

</head>

<body>

<h1>Passive Voice Exercise</h1>

<h2>Choose the correct answer.</h2>

<div id="quiz"></div>

<script>

let questions = [

/***********************
AM
************************/

{

active:"They invite me to the party.",

passive:"I ___ to the party.",

choices:[
"am invited",
"is invited",
"are invited"
],

correct:"am invited",

explanation:
"The subject is <b>I</b>, so we use <b>am + past participle</b>.<br><br>invite → invited."

},

{

active:"They call me Ali.",

passive:"I ___ Ali.",

choices:[
"am called",
"was called",
"is called"
],

correct:"am called",

explanation:
"The subject is <b>I</b>, so we use <b>am + past participle</b>."

},

{

active:"They choose me for the team.",

passive:"I ___ for the team.",

choices:[
"am chosen",
"are chosen",
"is chosen"
],

correct:"am chosen",

explanation:
"choose → chosen<br><br>The subject is <b>I</b>, so we use <b>am</b>."

},

/***********************
IS
************************/

{

active:"They clean the room every day.",

passive:"The room ___ every day.",

choices:[
"is cleaned",
"are cleaned",
"was cleaned"
],

correct:"is cleaned",

explanation:
"The room is singular.<br><br>Present Passive = <b>is + past participle</b>."

},

{

active:"She writes a letter.",

passive:"A letter ___ by her.",

choices:[
"is written",
"was written",
"are written"
],

correct:"is written",

explanation:
"Letter is singular.<br><br>write → written."

},

{

active:"They make a cake.",

passive:"A cake ___ by them.",

choices:[
"is made",
"are made",
"was made"
],

correct:"is made",

explanation:
"Cake is singular.<br><br>make → made."

},

/***********************
ARE
************************/

{

active:"They wash cars every morning.",

passive:"Cars ___ every morning.",

choices:[
"are washed",
"is washed",
"were washed"
],

correct:"are washed",

explanation:
"Cars are plural.<br><br>Use <b>are + past participle</b>."

},

{

active:"They build houses.",

passive:"Houses ___ by them.",

choices:[
"are built",
"is built",
"was built"
],

correct:"are built",

explanation:
"Houses are plural.<br><br>build → built."

},

{

active:"They paint the walls.",

passive:"The walls ___ blue.",

choices:[
"are painted",
"is painted",
"were painted"
],

correct:"are painted",

explanation:
"Walls are plural.<br><br>Use <b>are + past participle</b>."

},

  /***********************
WAS
************************/

{

active:"They repaired the car yesterday.",

passive:"The car ___ yesterday.",

choices:[
"was repaired",
"were repaired",
"is repaired"
],

correct:"was repaired",

explanation:
"The car is singular.<br><br>Past Passive = <b>was + past participle</b>.<br><br>repair → repaired."

},

{

active:"She wrote a book last year.",

passive:"A book ___ by her.",

choices:[
"was written",
"were written",
"is written"
],

correct:"was written",

explanation:
"Book is singular.<br><br>write → written."

},

{

active:"They built a bridge last year.",

passive:"A bridge ___ last year.",

choices:[
"was built",
"were built",
"is built"
],

correct:"was built",

explanation:
"Bridge is singular.<br><br>build → built."

},

/***********************
WERE
************************/

{

active:"They cleaned the rooms yesterday.",

passive:"The rooms ___ yesterday.",

choices:[
"were cleaned",
"was cleaned",
"are cleaned"
],

correct:"were cleaned",

explanation:
"Rooms are plural.<br><br>Past Passive = <b>were + past participle</b>."

},

{

active:"They painted the walls yesterday.",

passive:"The walls ___ yesterday.",

choices:[
"were painted",
"was painted",
"are painted"
],

correct:"were painted",

explanation:
"Walls are plural.<br><br>paint → painted."

},

{

active:"They opened the doors at 8:00.",

passive:"The doors ___ at 8:00.",

choices:[
"were opened",
"was opened",
"are opened"
],

correct:"were opened",

explanation:
"Doors are plural.<br><br>open → opened."

},

/***********************
WILL BE
************************/

{

active:"They will finish the work tomorrow.",

passive:"The work ___ tomorrow.",

choices:[
"will be finished",
"will finished",
"will is finished"
],

correct:"will be finished",

explanation:
"Future Passive = <b>will be + past participle</b>.<br><br>finish → finished."

},

{

active:"She will write a report.",

passive:"A report ___ by her.",

choices:[
"will be written",
"will written",
"will is written"
],

correct:"will be written",

explanation:
"write → written.<br><br>Future Passive = <b>will be + past participle</b>."

},

{

active:"They will build a school next year.",

passive:"A school ___ next year.",

choices:[
"will be built",
"will built",
"will is built"
],

correct:"will be built",

explanation:
"build → built.<br><br>Future Passive = <b>will be + past participle</b>."

}

];
  // Randomize question order

questions.sort(() => Math.random() - 0.5);


// Get the quiz container

let quiz = document.getElementById("quiz");


// Create each question

questions.forEach((q,index)=>{


    // Copy the choices

    let choices=[...q.choices];


    // Randomize answer order

    choices.sort(() => Math.random() - 0.5);


    quiz.innerHTML += `

<div class="question">

<h3>Question ${index+1}</h3>

<p><b>Active:</b> ${q.active}</p>

<p><b>Passive:</b> ${q.passive}</p>


<button onclick="check('${choices[0]}','${q.correct}',${index})">
${choices[0]}
</button>

<button onclick="check('${choices[1]}','${q.correct}',${index})">
${choices[1]}
</button>

<button onclick="check('${choices[2]}','${q.correct}',${index})">
${choices[2]}
</button>


<div id="answer${index}" class="answer"></div>

</div>

`;

});
  function check(selected, correct, index){

    let answer = document.getElementById("answer"+index);

    // Click again to hide the explanation
    if(answer.innerHTML !== ""){

        answer.innerHTML = "";
        return;

    }

    if(selected === correct){

        answer.innerHTML =
        "✅ <span style='color:green'>Correct!</span><br><br>" +
        questions[index].explanation;

    }

    else{

        answer.innerHTML =
        "❌ <span style='color:red'>Incorrect.</span><br>" +
        "<b>Correct answer:</b> " + correct +
        "<br><br>" +
        questions[index].explanation;

    }

}

</script>

</body>

</html>
